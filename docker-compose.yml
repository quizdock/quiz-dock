name: roux-quizz

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roux}
      POSTGRES_DB: ${POSTGRES_DB:-rouxquizz}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-roux} -d ${POSTGRES_DB:-rouxquizz}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # Auth optionnelle : démarrée uniquement avec --profile keycloak (AUTH_MODE=keycloak)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: ['keycloak']
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: 'true'
    ports:
      - '${KEYCLOAK_PORT:-8080}:8080'
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks: [internal, public]

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: runtime
    environment:
      NODE_ENV: production
      PORT: '3000'
      AUTH_MODE: ${AUTH_MODE:-none}
      DATABASE_URL: postgres://${POSTGRES_USER:-roux}:${POSTGRES_PASSWORD:-roux}@postgres:5432/${POSTGRES_DB:-rouxquizz}
      REDIS_URL: redis://redis:6379
      # Médias stockés sur un volume local et servis par le backend (proxy).
      MEDIA_DIR: /data/media
      MEDIA_MAX_BYTES: ${MEDIA_MAX_BYTES:-10485760}
      # Auth OIDC (utilisé seulement si AUTH_MODE=oidc). En Docker, l'issuer (host
      # vu par le navigateur) diffère de l'URI JWKS (host interne) — d'où deux
      # variables. Keycloak est l'IdP de référence en dev.
      OIDC_ISSUER: ${OIDC_ISSUER:-http://localhost:8080/realms/roux-quizz}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-http://keycloak:8080/realms/roux-quizz/protocol/openid-connect/certs}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - mediadata:/data/media
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal, public]

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: runtime
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-8081}:80'
    networks: [public]

volumes:
  pgdata:
  redisdata:
  mediadata:

networks:
  internal:
  public:
