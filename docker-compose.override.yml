# Override de développement (appliqué automatiquement par `docker compose up`).
# Principe : on NE monte JAMAIS le node_modules de l'hôte (glibc) dans l'image
# Alpine (musl). À la place, on monte les **sources + manifestes** et on lance
# `pnpm install` (frozen) au démarrage : ajouter une dépendance puis
# `docker compose restart <svc>` suffit — plus besoin de rebuild d'image.
services:
  # En dev, on expose Postgres sur l'hôte pour que la CLI Prisma (migrate/studio)
  # tourne depuis la machine. La stack interne continue d'utiliser `postgres:5432`.
  postgres:
    ports:
      - '${POSTGRES_PORT:-15432}:5432'

  # Exposé en dev pour les tests d'intégration WS/Redis depuis l'hôte.
  redis:
    ports:
      - '${REDIS_PORT:-16379}:6379'

  backend:
    build:
      target: build
    working_dir: /app/apps/backend
    # install (deps à jour) → build du contrat (dist non monté → recompilé depuis
    # le src monté) → migrations idempotentes → nest en watch.
    # `nest` exécuté directement pour éviter la vérif de deps de pnpm 11 sans TTY.
    command:
      [
        'sh',
        '-c',
        'pnpm install --filter @quiz-dock/backend... --frozen-lockfile --prefer-offline && pnpm --filter @quiz-dock/contracts build && node_modules/.bin/prisma migrate deploy && node node_modules/@nestjs/cli/bin/nest.js start --watch',
      ]
    environment:
      NODE_ENV: development
      AUTH_MODE: ${AUTH_MODE:-none}
    volumes:
      # Manifestes + lockfile + configs (pour `pnpm install` et les outils).
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./package.json:/app/package.json:ro
      - ./.npmrc:/app/.npmrc:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ./packages/contracts/package.json:/app/packages/contracts/package.json:ro
      - ./apps/backend/package.json:/app/apps/backend/package.json:ro
      - ./apps/backend/tsconfig.json:/app/apps/backend/tsconfig.json:ro
      - ./apps/backend/prisma.config.ts:/app/apps/backend/prisma.config.ts:ro
      - ./apps/backend/prisma:/app/apps/backend/prisma:ro
      # Sources (hot-reload).
      - ./apps/backend/src:/app/apps/backend/src
      - ./packages/contracts/src:/app/packages/contracts/src
    ports:
      - '${BACKEND_PORT:-13000}:3000'

  frontend:
    build:
      target: build
    command:
      [
        'sh',
        '-c',
        'printf "%s" "window.__APP_CONFIG__ = { appName: \"${APP_NAME:-QuizDock}\" };" > apps/frontend/public/config.js && pnpm install --filter @quiz-dock/frontend... --frozen-lockfile --prefer-offline && pnpm --filter @quiz-dock/contracts build && pnpm --filter @quiz-dock/frontend dev --host --port 5173',
      ]
    environment:
      VITE_API_URL: http://backend:3000
      # White-label : nom d'app injecté dans public/config.js au démarrage (sans rebuild).
      APP_NAME: ${APP_NAME:-QuizDock}
      npm_config_verify_deps_before_run: 'false'
    volumes:
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./package.json:/app/package.json:ro
      - ./.npmrc:/app/.npmrc:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ./packages/contracts/package.json:/app/packages/contracts/package.json:ro
      - ./apps/frontend/package.json:/app/apps/frontend/package.json:ro
      - ./apps/frontend/tsconfig.json:/app/apps/frontend/tsconfig.json:ro
      - ./apps/frontend/vite.config.ts:/app/apps/frontend/vite.config.ts:ro
      - ./apps/frontend/orval.config.ts:/app/apps/frontend/orval.config.ts:ro
      # Sources (hot-reload).
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/index.html:/app/apps/frontend/index.html
      - ./packages/contracts/src:/app/packages/contracts/src
      # White-label : override logo + CSS à chaud (sans rebuild).
      - ./branding:/app/apps/frontend/public/branding:ro
    ports:
      - '${VITE_PORT:-15173}:5173'
    depends_on:
      - backend
