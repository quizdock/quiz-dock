name: Security

# Deux niveaux de sévérité, volontairement distincts :
#  - job `deps`  → BLOQUE (exit ≠ 0) : CVE applicatives HIGH/CRITICAL, corrigeables
#                  par un bump (pnpm overrides). Actionnable, donc gate.
#  - job `image` → RAPPORTE seulement : CVE de l'OS du base-image, souvent sans
#                  correctif amont (ignore-unfixed) ; remonte dans l'onglet Security
#                  (SARIF) sans repeindre la CI en rouge à tort.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '27 4 * * 1' # lundi 04:27 UTC — veille hebdo de dérive du base-image
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # upload SARIF → onglet Security (gratuit, repo public)

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Dépendances applicatives : GATE ----
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Bloque la PR si une dépendance de prod a une CVE high/critical corrigeable.
      - name: pnpm audit (high+critical) — gate
        run: pnpm audit --prod --audit-level high

      - name: Trivy — système de fichiers (deps + config)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SARIF (fs)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ---- Image publiée : RAPPORT (non bloquant) ----
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Trivy — image publiée (:latest)
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true # CVE OS sans patch ne doivent pas casser la CI
        with:
          image-ref: fchaussin/quizdock:latest
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          format: sarif
          output: trivy-image.sarif

      - name: Upload SARIF (image)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
