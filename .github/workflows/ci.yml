name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    # Services pour les tests d'intégration (gateway WS + Redis, accès DB).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: live
          POSTGRES_PASSWORD: live
          POSTGRES_DB: livequizz
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U live -d livequizz"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://live:live@localhost:5432/livequizz?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build contracts
        run: pnpm contracts:build

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Migrate (DB de test)
        run: pnpm --filter @live-quizz/backend exec prisma migrate deploy

      - name: Tests
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

      - name: OpenAPI/Orval drift check
        run: |
          pnpm generate:api
          if ! git diff --exit-code -- apps/backend/openapi/openapi.json apps/frontend/src/api/generated; then
            echo "::error::Client REST désynchronisé de l'OpenAPI. Lance 'pnpm generate:api' et committe le résultat."
            exit 1
          fi
