name: Release

# Taguer une version (vX.Y.Z) est l'unique geste de release :
#   1. GitHub Release (source de vérité, canonique) — job `github-release`.
#   2. Images Docker Hub qui en découlent — jobs `publish` + `standalone`.
# Secrets requis (repo → Settings → Secrets and variables → Actions) :
#   DOCKERHUB_USERNAME = fchaussin
#   DOCKERHUB_TOKEN    = access token Docker Hub (Read & Write)
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: # build manuel possible (utilise :latest + le sha)

permissions:
  contents: read

jobs:
  # ---- Source de vérité : Release GitHub + CHANGELOG (auto, pour chaque tag) ----
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # créer la Release + committer le CHANGELOG
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout main (historique complet)
        uses: actions/checkout@v4
        with:
          ref: main # on commit le CHANGELOG régénéré sur la branche
          fetch-depth: 0 # tout l'historique + tags pour git-cliff

      # Source de vérité d'abord : la Release est garantie même si le commit échoue.
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # notes natives GitHub depuis commits/PRs
          make_latest: true
          name: QuizDock ${{ github.ref_name }}

      - name: Régénère CHANGELOG.md (git-cliff)
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --tag ${{ github.ref_name }} --output CHANGELOG.md

      # Best-effort : ne doit jamais casser une release (ex. branche protégée).
      - name: Commit du CHANGELOG sur main
        continue-on-error: true
        run: |
          if ! git diff --quiet -- CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "docs(changelog): ${{ github.ref_name }} [skip ci]"
            git push origin HEAD:main
          fi

  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: fchaussin/quizdock
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # All-in-one image (Postgres + Redis + app) for one-command beginner use.
  # Reuses the :latest artifact published above (COPY --from), so it runs after.
  standalone:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: fchaussin/quizdock
          tags: |
            type=raw,value=standalone
            type=semver,pattern=standalone-{{version}}

      - name: Build & push standalone (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=standalone
          cache-to: type=gha,mode=max,scope=standalone
