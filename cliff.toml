# git-cliff — génère CHANGELOG.md depuis les commits conventionnels.
# Maintenu automatiquement par .github/workflows/release.yml au tag vX.Y.Z.
# Doc : https://git-cliff.org

[changelog]
header = """
# Changelog

All notable changes to QuizDock are documented here.
Format based on [Keep a Changelog](https://keepachangelog.com); versions follow
[Semantic Versioning](https://semver.org). Generated from conventional commits.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}{% if commit.scope %} *({{ commit.scope }})*{% endif %}
    {%- endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Regroupe par type conventionnel ; ce qui n'est pas pertinent est ignoré.
commit_parsers = [
  { message = "^sec|^fix\\(security", group = "Security" },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^doc", group = "Documentation" },
  { message = "^docs", group = "Documentation" },
  { message = "^revert", group = "Reverts" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
  { message = "^build", group = "Build" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"
