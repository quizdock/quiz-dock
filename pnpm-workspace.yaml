packages:
  - apps/*
  - packages/*
# Remédiation CVE transitives (cf. docs/security/) — bumps patch/minor, même majeur.
overrides:
  ws@>=8.0.0 <8.21.0: '>=8.21.0'
  multer@<2.2.0: '>=2.2.0'
  js-yaml@<4.1.2: '>=4.1.2'
  '@hono/node-server@<1.19.13': '>=1.19.13 <2'
allowBuilds:
  '@prisma/engines': true
  '@scarf/scarf': false
  esbuild: true
  prisma: true
